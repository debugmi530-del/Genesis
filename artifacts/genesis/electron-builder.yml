appId: com.genesis.game
productName: Genesis
executableName: Genesis
copyright: Genesis

directories:
  output: dist/electron
  buildResources: build-resources

files:
  - dist/public/**
  - electron/**
  - package.json

extraMetadata:
  main: electron/main.cjs

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build-resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Genesis
