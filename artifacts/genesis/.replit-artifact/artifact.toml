kind = "web"
previewPath = "/"
title = "Genesis"
version = "1.0.0"
id = "artifacts/genesis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19321

[services.development]
run = "pnpm --filter @workspace/genesis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/genesis", "run", "build" ]
publicDir = "artifacts/genesis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19321"
BASE_PATH = "/"
