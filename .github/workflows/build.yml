name: Build Genesis

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove Replit-specific platform restrictions for CI
        run: |
          node -e "
          const fs = require('fs');

          try { fs.rmSync('pnpm-lock.yaml'); } catch(e) {}
          try { fs.rmSync('.npmrc'); } catch(e) {}

          let ws = fs.readFileSync('pnpm-workspace.yaml', 'utf8');
          const idx = ws.indexOf('\noverrides:');
          if (idx !== -1) ws = ws.slice(0, idx);
          fs.writeFileSync('pnpm-workspace.yaml', ws);

          console.log('CI platform setup done');
          "

      - name: Install dependencies
        run: pnpm install

      - name: Build Vite renderer
        run: pnpm --filter @workspace/genesis run build:electron
        env:
          PORT: "3000"
          BASE_PATH: "./"

      - name: Build Electron (Windows)
        run: pnpm --filter @workspace/genesis run electron:build -- --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Genesis — Latest Build"
          prerelease: true
          fail_on_unmatched_files: false
          body: |
            Автоматическая сборка из последнего коммита в `main`.

            **Windows:** скачайте `.exe` — установщик NSIS
          files: |
            artifacts/genesis/dist/electron/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
