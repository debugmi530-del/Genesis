name: Build Genesis

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove Replit-specific platform restrictions for CI
        run: |
          node -e "
          const fs = require('fs');

          // Remove lockfile so pnpm resolves fresh for the current platform
          try { fs.rmSync('pnpm-lock.yaml'); } catch(e) {}

          // Remove .npmrc — it pins supportedArchitectures to linux-only for Replit
          try { fs.rmSync('.npmrc'); } catch(e) {}

          // Strip the overrides section from pnpm-workspace.yaml.
          // That section excludes win32/darwin native binaries of rollup, esbuild,
          // tailwindcss/oxide and lightningcss to save space on Replit (linux-x64 only).
          // On CI each runner needs its own platform binary.
          let ws = fs.readFileSync('pnpm-workspace.yaml', 'utf8');
          const idx = ws.indexOf('\noverrides:');
          if (idx !== -1) ws = ws.slice(0, idx);
          fs.writeFileSync('pnpm-workspace.yaml', ws);

          console.log('CI platform setup done');
          "

      - name: Install dependencies
        run: pnpm install

      - name: Build Vite renderer
        run: pnpm --filter @workspace/genesis run build:electron
        env:
          PORT: "3000"
          BASE_PATH: "./"

      - name: Build Electron (Linux)
        if: matrix.platform == 'linux'
        run: pnpm --filter @workspace/genesis run electron:build -- --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (macOS)
        if: matrix.platform == 'mac'
        run: pnpm --filter @workspace/genesis run electron:build -- --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (Windows)
        if: matrix.platform == 'win'
        run: pnpm --filter @workspace/genesis run electron:build -- --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: genesis-${{ matrix.platform }}
          path: |
            artifacts/genesis/dist/electron/*.exe
            artifacts/genesis/dist/electron/*.dmg
            artifacts/genesis/dist/electron/*.AppImage
            artifacts/genesis/dist/electron/*.zip
            artifacts/genesis/dist/electron/*.nsis.7z
          if-no-files-found: warn
          retention-days: 30
